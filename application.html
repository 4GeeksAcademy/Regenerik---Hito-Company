<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro Brasaland</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<header class="bg-white shadow p-4 flex justify-between">
  <h1 class="font-bold text-xl">Brasaland 🔥</h1>
  <a href="index.html">← Volver</a>
</header>

<main class="max-w-2xl mx-auto bg-white p-8 mt-10 rounded shadow">

<h2 class="text-2xl font-bold mb-6 text-center">
  Registro Brasa Points
</h2>

<div class="bg-red-500 rounded p-4 mb-6 text-center">
  <ul class="text-sm text-white space-y-2">
    <li>Acumula 1 punto por cada $10.000 COP o $5 USD</li>
    <li>Canjea tus puntos por descuentos y platos gratis</li>
    <li>Ofertas exclusivas para miembros</li>
    <li>Registro 100% digital - ¡ya no más tarjetas de papel!</li>
  </ul>
</div>

<form id="form" class="space-y-4">

<input id="name" placeholder="Nombre completo" class="w-full border p-2">
<p id="error-name" class="text-red-500"></p>

<input id="email" placeholder="Email" class="w-full border p-2">
<p id="error-email" class="text-red-500"></p>

<input id="phone" placeholder="+57 o +1" class="w-full border p-2">
<p id="error-phone" class="text-red-500"></p>

<select id="country" class="w-full border p-2">
  <option value="">País</option>
</select>
<p id="error-country" class="text-red-500"></p>

<select id="city" class="w-full border p-2">
  <option value="">Ciudad</option>
</select>
<p id="error-city" class="text-red-500"></p>

<select id="location" class="w-full border p-2">
  <option value="">Ubicación</option>
</select>
<p id="error-location" class="text-red-500"></p>

<select id="dietary-preferences" class="w-full border p-2">
  <option value="">Preferencias Alimenticias</option>
  <option value="Frutas y verduras (como base)">Frutas y verduras (como base)</option>
  <option value="Legumbres (porotos, lentejas, garbanzos)">Legumbres (porotos, lentejas, garbanzos)</option>
  <option value="Carnes magras (pollo, pescado, vaca) cocinadas al horno o plancha">Carnes magras (pollo, pescado, vaca) cocinadas al horno o plancha</option>
  <option value="Alimentos ricos en fibra y granos integrales">Alimentos ricos en fibra y granos integrales</option>
</select>

<input id="birthdate" type="date" class="w-full border p-2">
<p id="error-birthdate" class="text-red-500"></p>

<select id="source" class="w-full border p-2">
  <option value="">¿Cómo nos conociste?</option>
  <option>Instagram</option>
  <option>Facebook</option>
  <option>Publicidad</option>
</select>
<p id="error-source" class="text-red-500"></p>

<label>
  <input type="checkbox" id="terms"> Acepto términos
</label>
<p id="error-terms" class="text-red-500"></p>

<button class="w-full bg-red-500 text-white py-3 rounded">
  Enviar 🔥
</button>

</form>

</main>

<script src="validation.js"></script>

</body>
</html>
